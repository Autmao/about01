<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>岗位详情 | 杂志书工作室</title>
  <link rel="stylesheet" href="assets/css/base.css">
  <link rel="stylesheet" href="assets/css/layout.css">
  <link rel="stylesheet" href="assets/css/components.css">
</head>
<body class="page-enter">

  <nav class="nav">
    <div class="nav__inner">
      <a href="index.html" class="nav__logo">
        <span class="nav__logo-dot"></span>
        about编辑部
      </a>
    </div>
  </nav>

  <main class="container">
    <nav class="breadcrumb">
      <a href="index.html">首页</a>
      <span class="breadcrumb__sep">/</span>
      <span class="breadcrumb__current" id="bc-title">岗位详情</span>
    </nav>

    <div class="detail-layout" id="detail-layout">
      <!-- 骨架屏 -->
      <div style="flex:1;padding:40px 0;color:var(--color-text-muted);text-align:center;">加载中...</div>
    </div>

    <!-- 相关岗位 -->
    <div class="related-section" id="related-section" style="display:none;">
      <h2 class="related-title">其他招募中的岗位</h2>
      <div class="related-grid" id="related-grid"></div>
    </div>
  </main>

  <!-- 手机端固定按钮 -->
  <div class="apply-bar-mobile" id="apply-bar-mobile" style="display:none;">
    <button class="btn btn--primary btn--full" id="apply-btn-mobile">立即投递</button>
  </div>

  <!-- 海报弹窗 -->
  <div class="poster-overlay" id="poster-overlay" onclick="closePoster(event)">
    <div class="poster-modal">
      <button class="poster-close" onclick="closePosterBtn()">×</button>
      <canvas id="poster-canvas"></canvas>
      <div class="poster-tip">长按图片保存 · 或点击下方按钮下载</div>
      <button class="btn btn--primary" id="poster-download-btn" onclick="downloadPoster()">下载海报</button>
    </div>
  </div>

  <footer class="footer" style="margin-top: var(--space-16);">
    <div class="container">
      <p>©about编辑部</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <script src="assets/js/store.js"></script>
  <script src="assets/js/utils.js"></script>
  <script src="assets/js/pages/job-detail.js"></script>
  <script src="assets/js/pages/chat-widget.js"></script>
</body>
</html>
