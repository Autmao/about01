<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的投递 | about编辑部</title>
  <link rel="stylesheet" href="assets/css/base.css">
  <link rel="stylesheet" href="assets/css/layout.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <style>
    .my-apps-page {
      min-height: 100vh;
      background: var(--color-bg);
    }
    .my-apps-wrap {
      max-width: 640px;
      margin: 0 auto;
      padding: var(--space-8) var(--space-5) var(--space-16);
    }

    /* OTP 登录卡片 */
    .otp-card {
      background: white;
      border-radius: var(--radius-xl);
      border: 1px solid var(--color-border-light);
      box-shadow: var(--shadow-sm);
      padding: var(--space-10) var(--space-8);
      text-align: center;
      margin-top: var(--space-8);
    }
    .otp-card__logo {
      font-size: var(--text-lg);
      font-weight: var(--weight-bold);
      color: var(--color-brand);
      margin-bottom: var(--space-1);
    }
    .otp-card__subtitle {
      font-size: var(--text-sm);
      color: var(--color-text-muted);
      margin-bottom: var(--space-8);
    }
    .otp-step { display: none; }
    .otp-step.active { display: block; }
    .otp-hint {
      font-size: var(--text-xs);
      color: var(--color-text-muted);
      margin-top: var(--space-3);
      line-height: var(--leading-normal);
    }
    .otp-error {
      font-size: var(--text-xs);
      color: var(--color-rejected);
      margin-top: var(--space-2);
      min-height: 18px;
    }
    .otp-code-input {
      font-size: var(--text-2xl);
      font-weight: var(--weight-bold);
      letter-spacing: 0.3em;
      text-align: center;
      max-width: 200px;
      margin: 0 auto;
    }
    .otp-resend {
      font-size: var(--text-xs);
      color: var(--color-text-muted);
      margin-top: var(--space-4);
    }
    .otp-resend a {
      color: var(--color-brand);
      cursor: pointer;
      text-decoration: none;
    }

    /* 投递列表 */
    .apps-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: var(--space-6);
    }
    .apps-header__email {
      font-size: var(--text-sm);
      color: var(--color-text-muted);
    }
    .app-card {
      background: white;
      border-radius: var(--radius-xl);
      border: 1px solid var(--color-border-light);
      box-shadow: var(--shadow-sm);
      padding: var(--space-5) var(--space-6);
      margin-bottom: var(--space-3);
    }
    .app-card__header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: var(--space-3);
    }
    .app-card__title {
      font-size: var(--text-base);
      font-weight: var(--weight-semibold);
      color: var(--color-text-primary);
      line-height: var(--leading-tight);
    }
    .app-card__meta {
      font-size: var(--text-xs);
      color: var(--color-text-muted);
      margin-top: var(--space-1);
    }
    .app-status-badge {
      flex-shrink: 0;
      font-size: var(--text-xs);
      font-weight: var(--weight-medium);
      padding: 3px 10px;
      border-radius: var(--radius-full);
    }
    .app-status-badge--pending  { background: #FFF8E1; color: #B8860B; }
    .app-status-badge--read     { background: #E3F2FD; color: #1565C0; }
    .app-status-badge--hired    { background: #E8F5E9; color: #2E7D32; }
    .app-status-badge--rejected { background: #FCE4EC; color: #C62828; }

    .empty-apps {
      text-align: center;
      padding: var(--space-16) var(--space-4);
      color: var(--color-text-muted);
      font-size: var(--text-sm);
    }
  </style>
</head>
<body class="my-apps-page page-enter">

  <nav class="nav">
    <div class="nav__inner">
      <a href="index.html" class="nav__logo">
        <span class="nav__logo-dot"></span>
        about编辑部
      </a>
    </div>
  </nav>

  <div class="my-apps-wrap">

    <!-- 登录区域 -->
    <div id="login-section">
      <div class="otp-card">
        <div class="otp-card__logo">about编辑部</div>
        <div class="otp-card__subtitle">查询你的投递状态</div>

        <!-- Step 1: 输入邮箱 -->
        <div class="otp-step active" id="step-email">
          <div class="form-field" style="text-align:left;">
            <label class="form-label">投递时填写的邮箱</label>
            <input type="email" class="form-input" id="input-email"
              placeholder="your@email.com" autocomplete="email">
          </div>
          <div class="otp-error" id="err-email"></div>
          <button class="btn btn--primary" style="width:100%;margin-top:var(--space-4);"
            id="btn-send" onclick="sendOtp()">发送验证码</button>
          <p class="otp-hint">验证码将发送至该邮箱，5 分钟内有效</p>
        </div>

        <!-- Step 2: 输入验证码 -->
        <div class="otp-step" id="step-code">
          <p style="font-size:var(--text-sm);color:var(--color-text-secondary);margin-bottom:var(--space-5);">
            验证码已发送至 <strong id="display-email"></strong>
          </p>
          <div class="form-field">
            <input type="text" class="form-input otp-code-input" id="input-code"
              placeholder="000000" maxlength="6" autocomplete="one-time-code"
              inputmode="numeric" pattern="\d{6}">
          </div>
          <div class="otp-error" id="err-code"></div>
          <button class="btn btn--primary" style="width:100%;margin-top:var(--space-4);"
            id="btn-verify" onclick="verifyOtp()">验证</button>
          <p class="otp-resend">没收到？<a onclick="resendOtp()">重新发送</a> &nbsp;·&nbsp;
            <a onclick="backToEmail()">更换邮箱</a></p>
        </div>
      </div>
    </div>

    <!-- 投递列表区域 -->
    <div id="apps-section" style="display:none;">
      <div class="apps-header">
        <h1 style="font-size:var(--text-xl);font-weight:var(--weight-bold);color:var(--color-text-primary);">
          我的投递
        </h1>
        <div style="display:flex;align-items:center;gap:var(--space-4);">
          <span class="apps-header__email" id="logged-email"></span>
          <button class="btn btn--ghost btn--sm" onclick="logout()">退出</button>
        </div>
      </div>
      <div id="apps-list"></div>
      <div class="empty-apps" id="apps-empty" style="display:none;">
        暂无投递记录
      </div>
    </div>

  </div>

  <script src="assets/js/store.js"></script>
  <script src="assets/js/utils.js"></script>
  <script>
    const STATUS_LABELS = {
      pending: '审核中',
      read: '已读取',
      hired: '已录用',
      rejected: '未通过',
    };
    const CATEGORY_LABELS = {
      writing: '撰稿人', editing: '编辑', design: '设计师',
      planning: '活动策划执行', podcast: '播客制作人', other: '其他',
    };

    let currentEmail = '';

    function setLoading(btn, loading) {
      btn.disabled = loading;
      btn.textContent = loading ? '请稍候...' : btn.dataset.label;
    }

    // 初始化：检查是否已登录
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('btn-send').dataset.label = '发送验证码';
      document.getElementById('btn-verify').dataset.label = '验证';
      if (Store.isApplicantLoggedIn()) {
        showApps();
      }
      // 回车提交
      document.getElementById('input-email').addEventListener('keydown', e => {
        if (e.key === 'Enter') sendOtp();
      });
      document.getElementById('input-code').addEventListener('keydown', e => {
        if (e.key === 'Enter') verifyOtp();
      });
    });

    async function sendOtp() {
      const email = document.getElementById('input-email').value.trim();
      const errEl = document.getElementById('err-email');
      const btn = document.getElementById('btn-send');
      errEl.textContent = '';
      if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        errEl.textContent = '请输入有效的邮箱地址';
        return;
      }
      setLoading(btn, true);
      try {
        await Store.sendOtp(email);
        currentEmail = email;
        document.getElementById('display-email').textContent = email;
        document.getElementById('step-email').classList.remove('active');
        document.getElementById('step-code').classList.add('active');
        setTimeout(() => document.getElementById('input-code').focus(), 100);
      } catch (e) {
        if (e.code === 'no_record') {
          errEl.textContent = '该邮箱暂无投递记录，请确认投递时填写的邮箱';
        } else {
          errEl.textContent = '发送失败，请稍后重试';
        }
      } finally {
        setLoading(btn, false);
      }
    }

    async function verifyOtp() {
      const code = document.getElementById('input-code').value.trim();
      const errEl = document.getElementById('err-code');
      const btn = document.getElementById('btn-verify');
      errEl.textContent = '';
      if (!code || !/^\d{6}$/.test(code)) {
        errEl.textContent = '请输入 6 位数字验证码';
        return;
      }
      setLoading(btn, true);
      try {
        await Store.verifyOtp(currentEmail, code);
        showApps();
      } catch (e) {
        if (e.code === 'invalid_code') {
          errEl.textContent = '验证码错误或已过期，请重新发送';
        } else {
          errEl.textContent = '验证失败，请稍后重试';
        }
      } finally {
        setLoading(btn, false);
      }
    }

    async function resendOtp() {
      document.getElementById('input-code').value = '';
      document.getElementById('err-code').textContent = '';
      try {
        await Store.sendOtp(currentEmail);
        Utils.showToast('验证码已重新发送', 'success');
      } catch {
        Utils.showToast('发送失败，请稍后重试', 'error');
      }
    }

    function backToEmail() {
      document.getElementById('step-code').classList.remove('active');
      document.getElementById('step-email').classList.add('active');
      document.getElementById('input-code').value = '';
    }

    async function showApps() {
      document.getElementById('login-section').style.display = 'none';
      document.getElementById('apps-section').style.display = 'block';
      const email = Store.getApplicantEmail();
      document.getElementById('logged-email').textContent = email || '';
      try {
        const apps = await Store.getApplicantApplications();
        renderApps(apps);
      } catch (e) {
        if (e.message === 'Session expired') {
          Utils.showToast('登录已过期，请重新登录', 'warning');
          document.getElementById('apps-section').style.display = 'none';
          document.getElementById('login-section').style.display = 'block';
        }
      }
    }

    function renderApps(apps) {
      const list = document.getElementById('apps-list');
      const empty = document.getElementById('apps-empty');
      if (apps.length === 0) {
        list.innerHTML = '';
        empty.style.display = 'block';
        return;
      }
      empty.style.display = 'none';
      list.innerHTML = apps.map(a => {
        const statusClass = `app-status-badge--${a.status}`;
        const statusText = STATUS_LABELS[a.status] || a.status;
        const cat = CATEGORY_LABELS[a.jobCategory] || a.jobCategory || '';
        const date = a.submittedAt ? a.submittedAt.slice(0, 10) : '';
        return `
        <div class="app-card">
          <div class="app-card__header">
            <div>
              <div class="app-card__title">${escHtml(a.jobTitle || '未知岗位')}</div>
              <div class="app-card__meta">${cat ? cat + ' · ' : ''}投递于 ${date}</div>
            </div>
            <span class="app-status-badge ${statusClass}">${statusText}</span>
          </div>
        </div>`;
      }).join('');
    }

    function escHtml(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function logout() {
      Store.applicantLogout();
      document.getElementById('apps-section').style.display = 'none';
      document.getElementById('login-section').style.display = 'block';
      document.getElementById('step-code').classList.remove('active');
      document.getElementById('step-email').classList.add('active');
      document.getElementById('input-email').value = '';
      currentEmail = '';
    }
  </script>
</body>
</html>
