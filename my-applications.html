<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的投递 | about编辑部</title>
  <link rel="stylesheet" href="assets/css/base.css">
  <link rel="stylesheet" href="assets/css/layout.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <style>
    .my-apps-page { min-height: 100vh; background: var(--color-bg); }
    .my-apps-wrap { max-width: 640px; margin: 0 auto; padding: var(--space-8) var(--space-5) var(--space-16); }

    .otp-card {
      background: white;
      border-radius: var(--radius-xl);
      border: 1px solid var(--color-border-light);
      box-shadow: var(--shadow-sm);
      padding: var(--space-10) var(--space-8);
      text-align: center;
      margin-top: var(--space-8);
    }
    .otp-card__logo { font-size: var(--text-lg); font-weight: var(--weight-bold); color: var(--color-brand); margin-bottom: var(--space-1); }
    .otp-card__subtitle { font-size: var(--text-sm); color: var(--color-text-muted); margin-bottom: var(--space-8); }
    .otp-step { display: none; }
    .otp-step.active { display: block; }
    .otp-error { font-size: var(--text-xs); color: var(--color-rejected); margin-top: var(--space-2); min-height: 18px; }
    .otp-code-input { font-size: var(--text-2xl); font-weight: var(--weight-bold); letter-spacing: 0.3em; text-align: center; max-width: 200px; margin: 0 auto; }

    .apps-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: var(--space-6); }
    .apps-header__info { font-size: var(--text-sm); color: var(--color-text-muted); }
    .app-card {
      background: white; border-radius: var(--radius-xl);
      border: 1px solid var(--color-border-light); box-shadow: var(--shadow-sm);
      padding: var(--space-5) var(--space-6); margin-bottom: var(--space-3);
    }
    .app-card__header { display: flex; align-items: flex-start; justify-content: space-between; gap: var(--space-3); }
    .app-card__title { font-size: var(--text-base); font-weight: var(--weight-semibold); color: var(--color-text-primary); line-height: var(--leading-tight); }
    .app-card__meta { font-size: var(--text-xs); color: var(--color-text-muted); margin-top: var(--space-1); }
    .app-status-badge { flex-shrink: 0; font-size: var(--text-xs); font-weight: var(--weight-medium); padding: 3px 10px; border-radius: var(--radius-full); }
    .app-status-badge--pending  { background: #FFF8E1; color: #B8860B; }
    .app-status-badge--read     { background: #E3F2FD; color: #1565C0; }
    .app-status-badge--hired    { background: #E8F5E9; color: #2E7D32; }
    .app-status-badge--rejected { background: #FCE4EC; color: #C62828; }
    .empty-apps { text-align: center; padding: var(--space-16) var(--space-4); color: var(--color-text-muted); font-size: var(--text-sm); }
  </style>
</head>
<body class="my-apps-page page-enter">

  <nav class="nav">
    <div class="nav__inner">
      <a href="index.html" class="nav__logo">
        <span class="nav__logo-dot"></span>
        about编辑部
      </a>
    </div>
  </nav>

  <div class="my-apps-wrap">

    <!-- 登录区域 -->
    <div id="login-section">
      <div class="otp-card">
        <div class="otp-card__logo">about编辑部</div>
        <div class="otp-card__subtitle">手机号登录，查看投递状态</div>

        <!-- Step 1: 输入手机号 -->
        <div class="otp-step active" id="step-phone">
          <div class="form-field" style="text-align:left;">
            <label class="form-label">手机号</label>
            <input type="tel" class="form-input" id="input-phone" maxlength="11"
              placeholder="请输入11位手机号" autocomplete="tel">
          </div>
          <div class="otp-error" id="err-phone"></div>
          <button class="btn btn--primary" style="width:100%;margin-top:var(--space-4);"
            id="btn-send" onclick="sendOtp()">获取验证码</button>
        </div>

        <!-- Step 2: 输入验证码 -->
        <div class="otp-step" id="step-code">
          <p style="font-size:var(--text-sm);color:var(--color-text-secondary);margin-bottom:var(--space-5);">
            验证码已发送至 <strong id="display-phone"></strong>
          </p>
          <div class="form-field">
            <input type="text" class="form-input otp-code-input" id="input-code"
              placeholder="000000" maxlength="6" autocomplete="one-time-code"
              inputmode="numeric" pattern="\d{6}">
          </div>
          <div class="otp-error" id="err-code"></div>
          <button class="btn btn--primary" style="width:100%;margin-top:var(--space-4);"
            id="btn-verify" onclick="verifyOtp()">登录</button>
          <p style="font-size:var(--text-xs);color:var(--color-text-muted);margin-top:var(--space-4);">
            没收到？<a href="#" onclick="backToPhone(event)" style="color:var(--color-brand);">重新发送</a>
          </p>
        </div>
      </div>
    </div>

    <!-- 投递列表区域 -->
    <div id="apps-section" style="display:none;">
      <div class="apps-header">
        <h1 style="font-size:var(--text-xl);font-weight:var(--weight-bold);color:var(--color-text-primary);">
          我的投递
        </h1>
        <div style="display:flex;align-items:center;gap:var(--space-4);">
          <span class="apps-header__info" id="logged-phone"></span>
          <button class="btn btn--ghost btn--sm" onclick="logout()">退出</button>
        </div>
      </div>
      <div id="apps-list"></div>
      <div class="empty-apps" id="apps-empty" style="display:none;">
        暂无投递记录，<a href="index.html" style="color:var(--color-brand);">去看看招募岗位</a>
      </div>
    </div>

  </div>

  <script src="assets/js/store.js"></script>
  <script src="assets/js/utils.js"></script>
  <script>
    const STATUS_LABELS = { pending: '审核中', read: '已读取', hired: '已录用', rejected: '未通过' };

    let currentPhone = '';

    function escHtml(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    document.addEventListener('DOMContentLoaded', () => {
      if (Store.isUserLoggedIn()) {
        showApps();
        return;
      }
      document.getElementById('input-phone').addEventListener('keydown', e => {
        if (e.key === 'Enter') sendOtp();
      });
      document.getElementById('input-code').addEventListener('keydown', e => {
        if (e.key === 'Enter') verifyOtp();
      });
    });

    async function sendOtp() {
      const phone = document.getElementById('input-phone').value.trim();
      const errEl = document.getElementById('err-phone');
      errEl.textContent = '';
      if (!/^1[3-9]\d{9}$/.test(phone)) {
        errEl.textContent = '请输入有效的11位手机号';
        return;
      }
      const btn = document.getElementById('btn-send');
      btn.disabled = true; btn.textContent = '发送中…';
      try {
        await Store.sendUserOtp(phone);
        currentPhone = phone;
        document.getElementById('display-phone').textContent = phone;
        document.getElementById('step-phone').classList.remove('active');
        document.getElementById('step-code').classList.add('active');
        setTimeout(() => document.getElementById('input-code').focus(), 100);
      } catch (e) {
        errEl.textContent = '验证码发送失败，请稍后重试';
      } finally {
        btn.disabled = false; btn.textContent = '获取验证码';
      }
    }

    async function verifyOtp() {
      const code = document.getElementById('input-code').value.trim();
      const errEl = document.getElementById('err-code');
      errEl.textContent = '';
      if (!code || !/^\d{6}$/.test(code)) {
        errEl.textContent = '请输入6位数字验证码';
        return;
      }
      const btn = document.getElementById('btn-verify');
      btn.disabled = true; btn.textContent = '验证中…';
      try {
        await Store.verifyUserOtp(currentPhone, code, '', '');
        showApps();
      } catch (e) {
        errEl.textContent = e.status === 401 ? '验证码错误或已过期' : '验证失败，请重试';
        btn.disabled = false; btn.textContent = '登录';
      }
    }

    function backToPhone(e) {
      e.preventDefault();
      document.getElementById('step-code').classList.remove('active');
      document.getElementById('step-phone').classList.add('active');
      document.getElementById('input-code').value = '';
      document.getElementById('err-code').textContent = '';
      document.getElementById('input-phone').value = currentPhone;
    }

    async function showApps() {
      document.getElementById('login-section').style.display = 'none';
      document.getElementById('apps-section').style.display = 'block';
      const user = Store.getCurrentApplicant();
      document.getElementById('logged-phone').textContent = user?.phone || '';
      try {
        const apps = await Store.getUserApplications();
        renderApps(apps);
      } catch (e) {
        if (e.message === 'Session expired') {
          Utils.showToast('登录已过期，请重新登录', 'warning');
          document.getElementById('apps-section').style.display = 'none';
          document.getElementById('login-section').style.display = 'block';
        }
      }
    }

    function renderApps(apps) {
      const list = document.getElementById('apps-list');
      const empty = document.getElementById('apps-empty');
      if (!apps.length) { list.innerHTML = ''; empty.style.display = 'block'; return; }
      empty.style.display = 'none';
      list.innerHTML = apps.map(a => {
        const statusClass = `app-status-badge--${a.status}`;
        const statusText = STATUS_LABELS[a.status] || a.status;
        const date = a.submittedAt ? a.submittedAt.slice(0, 10) : '';
        return `
        <div class="app-card">
          <div class="app-card__header">
            <div>
              <div class="app-card__title">${escHtml(a.jobTitle || '未知岗位')}</div>
              <div class="app-card__meta">投递于 ${date}</div>
            </div>
            <span class="app-status-badge ${statusClass}">${statusText}</span>
          </div>
        </div>`;
      }).join('');
    }

    function logout() {
      Store.userLogout();
      document.getElementById('apps-section').style.display = 'none';
      document.getElementById('login-section').style.display = 'block';
      document.getElementById('step-code').classList.remove('active');
      document.getElementById('step-phone').classList.add('active');
      document.getElementById('input-phone').value = '';
      currentPhone = '';
    }
  </script>
</body>
</html>
