<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的投递 | about编辑部</title>
  <link rel="stylesheet" href="assets/css/base.css">
  <link rel="stylesheet" href="assets/css/layout.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <link rel="stylesheet" href="assets/css/home-v2.css">
  <style>
    .query-page {
      --home-ink: #111111;
      --home-coal: #1f2021;
      --home-coal-2: #161718;
      --home-paper: #f5f1e8;
      --home-paper-soft: #fbf8f1;
      --home-warm: #ded4c2;
      --home-line: rgba(17, 17, 17, 0.18);
      --home-line-strong: rgba(17, 17, 17, 0.82);
      --home-muted: #6f6a60;
      --home-accent: #b84a36;
      min-height: 100vh;
      background:
        linear-gradient(90deg, rgba(17,17,17,0.035) 1px, transparent 1px),
        linear-gradient(180deg, rgba(17,17,17,0.035) 1px, transparent 1px),
        var(--home-paper);
      background-size: 56px 56px;
      color: var(--home-ink);
    }
    .query-wrap {
      min-height: 100vh;
      padding: 108px clamp(18px, 5vw, 76px) 64px;
      display: grid;
      grid-template-columns: minmax(0, 0.9fr) minmax(360px, 1.1fr);
      gap: clamp(30px, 6vw, 92px);
      align-items: center;
    }
    .query-intro {
      max-width: 680px;
    }
    .query-kicker {
      color: var(--home-accent);
      font-size: 13px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-weight: 760;
      margin-bottom: 18px;
    }
    .query-intro h1 {
      margin: 0;
      font-size: clamp(48px, 8vw, 104px);
      line-height: 0.92;
      letter-spacing: 0;
      font-weight: 720;
    }
    .query-intro p {
      margin: 28px 0 0;
      max-width: 560px;
      color: var(--home-muted);
      font-size: clamp(17px, 2vw, 21px);
      line-height: 1.72;
    }
    .query-card {
      border: 1px solid var(--home-line-strong);
      background: var(--home-paper-soft);
      padding: clamp(24px, 4vw, 38px);
      box-shadow: 0 26px 70px rgba(0,0,0,0.09);
    }
    .query-card__caption {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      color: var(--home-muted);
      font-size: 12px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 34px;
    }
    .query-card h2 {
      margin: 0 0 10px;
      font-size: clamp(28px, 4vw, 48px);
      line-height: 1;
      font-weight: 700;
    }
    .query-card__hint {
      color: var(--home-muted);
      font-size: 15px;
      line-height: 1.7;
      margin-bottom: 28px;
    }
    .query-form .form-label {
      letter-spacing: 0.06em;
      text-transform: uppercase;
      font-size: 12px;
      color: var(--home-muted);
    }
    .query-form .form-input {
      border-radius: 0;
      border-color: var(--home-line-strong);
      background: transparent;
      min-height: 48px;
    }
    .query-form .btn {
      border-radius: 999px;
    }
    .query-page .btn--primary {
      background: var(--home-ink);
      color: var(--home-paper-soft);
    }
    .query-page .btn--primary:hover {
      background: #3a3a38;
    }
    .query-error {
      font-size: var(--text-xs);
      color: var(--color-rejected);
      margin-top: var(--space-2);
      min-height: 18px;
    }
    .apps-header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 24px;
    }
    .apps-header h1 {
      margin: 0;
      font-size: clamp(32px, 5vw, 62px);
      line-height: 0.95;
      font-weight: 720;
    }
    .apps-header__info {
      display: block;
      color: var(--home-muted);
      font-size: 13px;
      margin-top: 10px;
    }
    .query-results {
      grid-column: 1 / -1;
      max-width: 980px;
      margin: 0 auto;
      width: 100%;
    }
    .query-app-card {
      border-top: 1px solid var(--home-line-strong);
      padding: 24px 0;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 18px;
      align-items: start;
    }
    .query-app-card:last-child {
      border-bottom: 1px solid var(--home-line-strong);
    }
    .query-app-card__title {
      font-size: clamp(24px, 3vw, 38px);
      line-height: 1;
      font-weight: 700;
      color: var(--home-ink);
    }
    .query-app-card__meta {
      color: var(--home-muted);
      font-size: 14px;
      margin-top: 9px;
    }
    .app-status-badge {
      flex-shrink: 0;
      font-size: var(--text-xs);
      font-weight: var(--weight-medium);
      padding: 6px 11px;
      border-radius: var(--radius-full);
      border: 1px solid currentColor;
    }
    .app-status-badge--pending  { color: #a56f1f; }
    .app-status-badge--read     { color: #2c5f9f; }
    .app-status-badge--hired    { color: #2c4a3e; }
    .app-status-badge--rejected { color: #a04840; }
    .empty-apps {
      border-top: 1px solid var(--home-line-strong);
      border-bottom: 1px solid var(--home-line-strong);
      padding: 42px 0;
      color: var(--home-muted);
      font-size: var(--text-sm);
    }
    .empty-apps a {
      color: var(--home-ink);
      font-weight: 650;
    }
    @media (max-width: 860px) {
      .query-wrap { grid-template-columns: 1fr; align-items: start; }
      .apps-header { align-items: flex-start; flex-direction: column; }
      .query-app-card { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body class="query-page page-enter">

  <nav class="home-nav" aria-label="主导航">
    <a class="home-nav__brand" href="index.html">about编辑部</a>
    <div class="home-nav__links">
      <a href="index.html#open-calls">正在招募</a>
    </div>
    <a class="home-nav__cta" href="index.html">返回首页</a>
  </nav>

  <main class="query-wrap">
    <section class="query-intro" id="query-intro">
      <div class="query-kicker">Application Status</div>
      <h1>查询你的投递。</h1>
      <p>
        这里不需要短信验证码。输入投递时填写的邮箱，就能查看当前记录与处理状态。
      </p>
    </section>

    <section class="query-card" id="query-section">
      <div class="query-card__caption">
        <span>about open call</span>
        <span>status desk</span>
      </div>
      <h2>用邮箱进入记录。</h2>
      <p class="query-card__hint">如果没有查到记录，请确认邮箱是否与投递表单中填写的一致。</p>
      <div class="query-form">
        <div class="form-field" style="text-align:left;">
          <label class="form-label">投递邮箱</label>
          <input type="text" inputmode="email" class="form-input" id="input-email"
            placeholder="name@example.com" autocomplete="email">
        </div>
        <div class="query-error" id="err-email"></div>
        <button class="btn btn--primary btn--full" id="btn-query" onclick="queryApps()">查看投递记录</button>
      </div>
    </section>

    <section class="query-results" id="apps-section" style="display:none;">
      <div class="apps-header">
        <div>
          <div class="query-kicker">My Applications</div>
          <h1>我的投递。</h1>
          <span class="apps-header__info" id="queried-email"></span>
        </div>
        <div style="display:flex;align-items:center;gap:var(--space-3);">
          <button class="btn btn--ghost btn--sm" onclick="resetQuery()">重新查询</button>
        </div>
      </div>
      <div id="apps-list"></div>
      <div class="empty-apps" id="apps-empty" style="display:none;">
        暂无投递记录，<a href="index.html#open-calls">去看看正在招募的 brief</a>
      </div>
    </section>
  </main>

  <script src="assets/js/store.js"></script>
  <script src="assets/js/utils.js"></script>
  <script>
    const STATUS_LABELS = { pending: '审核中', read: '已读取', hired: '已录用', rejected: '未通过' };

    let currentEmail = '';

    function escHtml(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('input-email').addEventListener('keydown', e => {
        if (e.key === 'Enter') queryApps();
      });
    });

    async function queryApps() {
      const email = document.getElementById('input-email').value.trim().toLowerCase();
      const errEl = document.getElementById('err-email');
      errEl.textContent = '';
      if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        errEl.textContent = '请输入有效的邮箱地址';
        return;
      }
      const btn = document.getElementById('btn-query');
      btn.disabled = true; btn.textContent = '查询中…';
      try {
        const apps = await Store.getMyApplications(email);
        currentEmail = email;
        document.getElementById('query-intro').style.display = 'none';
        document.getElementById('query-section').style.display = 'none';
        document.getElementById('apps-section').style.display = 'block';
        document.getElementById('queried-email').textContent = email;
        renderApps(apps);
      } catch (e) {
        errEl.textContent = e.message && e.message.includes('Failed to fetch')
          ? '当前页面无法连接线上服务，请从 about01.vercel.app 打开后重试'
          : '查询失败，请稍后重试';
      } finally {
        btn.disabled = false; btn.textContent = '查看投递记录';
      }
    }

    function renderApps(apps) {
      const list = document.getElementById('apps-list');
      const empty = document.getElementById('apps-empty');
      if (!apps.length) { list.innerHTML = ''; empty.style.display = 'block'; return; }
      empty.style.display = 'none';
      list.innerHTML = apps.map(a => {
        const statusClass = `app-status-badge--${a.status}`;
        const statusText = STATUS_LABELS[a.status] || a.status;
        const date = a.submittedAt ? a.submittedAt.slice(0, 10) : '';
        return `
        <article class="query-app-card">
          <div>
            <div class="query-app-card__title">${escHtml(a.jobTitle || '未知岗位')}</div>
            <div class="query-app-card__meta">投递于 ${date || '—'}</div>
          </div>
          <span class="app-status-badge ${statusClass}">${statusText}</span>
        </article>`;
      }).join('');
    }

    function resetQuery() {
      document.getElementById('apps-section').style.display = 'none';
      document.getElementById('query-intro').style.display = 'block';
      document.getElementById('query-section').style.display = 'block';
      document.getElementById('input-email').value = currentEmail;
      document.getElementById('err-email').textContent = '';
      setTimeout(() => document.getElementById('input-email').focus(), 50);
    }
  </script>
</body>
</html>
