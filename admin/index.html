<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>岗位管理 | 管理后台</title>
  <link rel="stylesheet" href="../assets/css/base.css">
  <link rel="stylesheet" href="../assets/css/layout.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/admin.css">
</head>
<body>

  <div class="admin-layout">
    <!-- 侧边栏 -->
    <aside class="admin-sidebar">
      <div class="admin-sidebar__brand">
        <div class="admin-sidebar__logo">about编辑部</div>
        <div class="admin-sidebar__tag">管理后台</div>
      </div>
      <div class="admin-sidebar__user" id="sidebar-user"></div>
      <nav class="admin-nav">
        <a href="index.html" class="admin-nav-item active">
          <span class="admin-nav-item__icon">01</span> 岗位管理
        </a>
        <a href="applications.html" class="admin-nav-item">
          <span class="admin-nav-item__icon">02</span> 投递管理
        </a>
        <a href="collaborators.html" class="admin-nav-item">
          <span class="admin-nav-item__icon">03</span> 合作者档案
        </a>
      <a href="chat.html" class="admin-nav-item" id="nav-chat">
        <span class="admin-nav-item__icon">04</span> 咨询记录
      </a>
        <a href="accounts.html" class="admin-nav-item" id="nav-accounts">
          <span class="admin-nav-item__icon">05</span> <span id="nav-accounts-label">账号设置</span>
        </a>
      </nav>
      <div class="admin-sidebar__footer">
        <a href="../index.html" target="_blank">↗ 访问前台</a>
        <a href="#" onclick="logout(); return false;">退出登录</a>
      </div>
    </aside>

    <!-- 主内容 -->
    <main class="admin-main page-enter">
      <div class="admin-topbar">
        <h1 class="admin-page-title">岗位管理</h1>
        <a href="job-edit.html" class="btn btn--primary">+ 发布新岗位</a>
      </div>

      <div class="admin-content">
        <!-- 统计卡片 -->
        <div class="stat-cards" id="stat-cards">
          <div class="stat-card">
            <div class="stat-card__label">招募中岗位</div>
            <div class="stat-card__value" id="stat-open">—</div>
          </div>
          <div class="stat-card">
            <div class="stat-card__label">本月新增投递</div>
            <div class="stat-card__value" id="stat-monthly">—</div>
          </div>
          <div class="stat-card">
            <div class="stat-card__label">待处理投递</div>
            <div class="stat-card__value" id="stat-pending">—</div>
          </div>
          <div class="stat-card">
            <div class="stat-card__label">已录用人次</div>
            <div class="stat-card__value" id="stat-hired">—</div>
          </div>
        </div>

        <!-- 岗位表格 -->
        <div class="data-table-wrap">
          <div class="table-toolbar">
            <div class="status-tabs" id="status-tabs">
              <button class="status-tab active" data-status="all">全部 <span class="status-tab__count" id="count-all">0</span></button>
              <button class="status-tab" data-status="open">招募中 <span class="status-tab__count" id="count-open">0</span></button>
              <button class="status-tab" data-status="closed">已截止 <span class="status-tab__count" id="count-closed">0</span></button>
              <button class="status-tab" data-status="draft">草稿 <span class="status-tab__count" id="count-draft">0</span></button>
            </div>
            <div class="table-search">
              <input type="search" placeholder="搜索岗位名称..." id="table-search">
            </div>
          </div>
          <table class="data-table">
            <thead>
              <tr>
                <th>岗位名称</th>
                <th>类型</th>
                <th>负责人</th>
                <th>状态</th>
                <th>投递数</th>
                <th>截止日期</th>
                <th>发布时间</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="jobs-tbody"></tbody>
          </table>
          <div class="admin-empty" id="jobs-empty" style="display:none;">
            <div class="admin-empty__icon">📭</div>
            <div class="admin-empty__text">暂无岗位，<a href="job-edit.html" style="color:var(--color-brand);">立即发布</a></div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="../assets/js/store.js"></script>
  <script src="../assets/js/utils.js"></script>
  <script src="../assets/js/pages/admin-jobs.js"></script>
</body>
</html>
