<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>投递管理 | 管理后台</title>
  <link rel="stylesheet" href="../assets/css/base.css">
  <link rel="stylesheet" href="../assets/css/layout.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/admin.css">
</head>
<body>
<div class="admin-layout">
  <aside class="admin-sidebar">
    <div class="admin-sidebar__brand">
      <div class="admin-sidebar__logo">about编辑部</div>
      <div class="admin-sidebar__tag">管理后台</div>
    </div>
    <div class="admin-sidebar__user" id="sidebar-user"></div>
    <nav class="admin-nav">
      <a href="index.html" class="admin-nav-item">
        <span class="admin-nav-item__icon">📋</span> 岗位管理
      </a>
      <a href="applications.html" class="admin-nav-item active">
        <span class="admin-nav-item__icon">📬</span> 投递管理
      </a>
      <a href="collaborators.html" class="admin-nav-item">
        <span class="admin-nav-item__icon">👥</span> 合作者档案
      </a>
      <a href="chat.html" class="admin-nav-item" id="nav-chat">
        <span class="admin-nav-item__icon">💬</span> 聊天记录
      </a>
      <a href="accounts.html" class="admin-nav-item" id="nav-accounts">
        <span class="admin-nav-item__icon">🔑</span> <span id="nav-accounts-label">账号设置</span>
      </a>
    </nav>
    <div class="admin-sidebar__footer">
      <a href="../index.html" target="_blank">↗ 访问前台</a>
      <a href="#" onclick="logout(); return false;">退出登录</a>
    </div>
  </aside>

  <main class="admin-main page-enter">
    <div class="admin-topbar">
      <h1 class="admin-page-title">投递管理</h1>
    </div>

    <div class="admin-content">
      <div class="data-table-wrap">
        <!-- 岗位选择 -->
        <div class="job-selector-wrap">
          <label>查看岗位：</label>
          <select class="job-selector" id="job-selector">
            <option value="">全部岗位</option>
          </select>
        </div>

        <!-- 状态 Tabs -->
        <div class="status-tabs" id="status-tabs" style="margin-top:var(--space-4);">
          <button class="status-tab active" data-status="all">全部 <span class="status-tab__count" id="cnt-all">0</span></button>
          <button class="status-tab" data-status="pending">待查看 <span class="status-tab__count" id="cnt-pending">0</span></button>
          <button class="status-tab" data-status="read">已读 <span class="status-tab__count" id="cnt-read">0</span></button>
          <button class="status-tab" data-status="hired">录用 <span class="status-tab__count" id="cnt-hired">0</span></button>
          <button class="status-tab" data-status="rejected">婉拒 <span class="status-tab__count" id="cnt-rejected">0</span></button>
        </div>

        <!-- 搜索 -->
        <div style="padding:var(--space-4) var(--space-5);">
          <input type="search" class="form-input" id="app-search" placeholder="搜索姓名或邮箱..." style="max-width:280px;font-size:var(--text-sm);">
        </div>

        <!-- 投递列表 -->
        <div class="apps-list" id="apps-list"></div>
        <div class="admin-empty" id="apps-empty" style="display:none;">
          <div class="admin-empty__icon">📭</div>
          <div class="admin-empty__text">暂无投递记录</div>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="../assets/js/store.js"></script>
<script src="../assets/js/utils.js"></script>
<script src="../assets/js/pages/admin-apps.js"></script>
</body>
</html>
