<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>账号管理 | 管理后台</title>
  <link rel="stylesheet" href="../assets/css/base.css">
  <link rel="stylesheet" href="../assets/css/layout.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/admin.css">
</head>
<body>
<div class="admin-layout">
  <aside class="admin-sidebar">
    <div class="admin-sidebar__brand">
      <div class="admin-sidebar__logo">about编辑部</div>
      <div class="admin-sidebar__tag">管理后台</div>
    </div>
    <div class="admin-sidebar__user" id="sidebar-user"></div>
    <nav class="admin-nav">
      <a href="index.html" class="admin-nav-item">
        <span class="admin-nav-item__icon">📋</span> 岗位管理
      </a>
      <a href="applications.html" class="admin-nav-item">
        <span class="admin-nav-item__icon">📬</span> 投递管理
      </a>
      <a href="collaborators.html" class="admin-nav-item">
        <span class="admin-nav-item__icon">👥</span> 合作者档案
      </a>
      <a href="accounts.html" class="admin-nav-item active" id="nav-accounts">
        <span class="admin-nav-item__icon">🔑</span> 账号管理
      </a>
    </nav>
    <div class="admin-sidebar__footer">
      <a href="../index.html" target="_blank">↗ 访问前台</a>
      <a href="#" onclick="logout(); return false;">退出登录</a>
    </div>
  </aside>

  <main class="admin-main page-enter">
    <div class="admin-topbar">
      <h1 class="admin-page-title">账号管理</h1>
    </div>
    <div class="admin-content">

      <!-- 成员管理（仅 superadmin 可见） -->
      <div id="member-management-section">
        <div style="background:white;border-radius:var(--radius-xl);padding:var(--space-6);
                    border:1px solid var(--color-border-light);box-shadow:var(--shadow-sm);
                    max-width:500px;margin-bottom:var(--space-6);">
          <h2 style="font-size:var(--text-base);font-weight:var(--weight-semibold);margin-bottom:var(--space-4);">添加成员账号</h2>
          <div class="form-row" style="margin-bottom:var(--space-3);">
            <div>
              <label class="form-label">登录账号</label>
              <input type="tel" class="form-input" id="f-username" placeholder="手机号码">
            </div>
            <div>
              <label class="form-label">用户名</label>
              <input type="text" class="form-input" id="f-displayname" placeholder="后台显示的名字">
            </div>
          </div>
          <div class="form-row" style="margin-bottom:var(--space-4);">
            <div>
              <label class="form-label">初始密码</label>
              <input type="password" class="form-input" id="f-password" placeholder="至少6位">
            </div>
            <div>
              <label class="form-label">角色</label>
              <select class="form-input" id="f-role">
                <option value="member">成员</option>
                <option value="superadmin">管理员</option>
              </select>
            </div>
          </div>
          <button class="btn btn--primary" onclick="createMember()">创建账号</button>
          <div id="create-error" style="color:var(--color-rejected);font-size:var(--text-sm);margin-top:8px;display:none;"></div>
        </div>

        <div class="data-table-wrap" style="margin-bottom:var(--space-8);">
          <table class="data-table">
            <thead>
              <tr>
                <th>登录账号</th>
                <th>用户名</th>
                <th>角色</th>
                <th>创建时间</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="users-tbody"></tbody>
          </table>
        </div>
      </div>

      <!-- 修改我的密码（所有人可见） -->
      <div style="background:white;border-radius:var(--radius-xl);padding:var(--space-6);
                  border:1px solid var(--color-border-light);box-shadow:var(--shadow-sm);
                  max-width:400px;">
        <h2 style="font-size:var(--text-base);font-weight:var(--weight-semibold);margin-bottom:var(--space-4);">修改我的密码</h2>
        <div class="form-field" style="margin-bottom:var(--space-3);">
          <label class="form-label">当前密码</label>
          <input type="password" class="form-input" id="cp-current">
        </div>
        <div class="form-field" style="margin-bottom:var(--space-4);">
          <label class="form-label">新密码（至少6位）</label>
          <input type="password" class="form-input" id="cp-new">
        </div>
        <button class="btn btn--primary" onclick="changeMyPwd()">修改密码</button>
        <div id="cp-error" style="color:var(--color-rejected);font-size:var(--text-sm);margin-top:8px;display:none;"></div>
      </div>

    </div>
  </main>
</div>

<!-- 重置密码 Modal -->
<div class="modal-overlay" id="reset-modal" style="display:none;" onclick="closeResetModal(event)">
  <div class="modal-box" style="max-width:360px;" onclick="event.stopPropagation()">
    <div class="modal-header">
      <h2 class="modal-title">重置密码</h2>
      <button class="modal-close" onclick="closeResetModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="form-field" style="margin-bottom:var(--space-4);">
        <label class="form-label">新密码（至少6位）</label>
        <input type="password" class="form-input" id="reset-pwd" placeholder="">
      </div>
      <button class="btn btn--primary btn--full" onclick="doReset()">确认重置</button>
      <div id="reset-error" style="color:var(--color-rejected);font-size:var(--text-sm);margin-top:8px;display:none;"></div>
    </div>
  </div>
</div>

<script src="../assets/js/store.js"></script>
<script src="../assets/js/utils.js"></script>
<script src="../assets/js/pages/admin-accounts.js"></script>
</body>
</html>
