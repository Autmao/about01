<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>咨询记录 | 管理后台</title>
  <link rel="stylesheet" href="../assets/css/base.css">
  <link rel="stylesheet" href="../assets/css/layout.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/admin.css">
</head>
<body>
<div class="admin-layout">
  <aside class="admin-sidebar">
    <div class="admin-sidebar__brand">
      <div class="admin-sidebar__logo">about编辑部</div>
      <div class="admin-sidebar__tag">管理后台</div>
    </div>
    <div class="admin-sidebar__user" id="sidebar-user"></div>
    <nav class="admin-nav">
      <a href="index.html" class="admin-nav-item">
        <span class="admin-nav-item__icon">01</span> 岗位管理
      </a>
      <a href="applications.html" class="admin-nav-item">
        <span class="admin-nav-item__icon">02</span> 投递管理
      </a>
      <a href="collaborators.html" class="admin-nav-item">
        <span class="admin-nav-item__icon">03</span> 合作者档案
      </a>
      <a href="chat.html" class="admin-nav-item active">
        <span class="admin-nav-item__icon">04</span> 咨询记录
      </a>
      <a href="accounts.html" class="admin-nav-item" id="nav-accounts">
        <span class="admin-nav-item__icon">05</span> <span id="nav-accounts-label">账号管理</span>
      </a>
    </nav>
    <div class="admin-sidebar__footer">
      <a href="../index.html" target="_blank">访问前台</a>
      <a href="#" onclick="logout(); return false;">退出登录</a>
    </div>
  </aside>

  <main class="admin-main page-enter">
    <div class="admin-topbar">
      <h1 class="admin-page-title">咨询记录</h1>
    </div>

    <div class="admin-content">
      <div class="data-table-wrap">
        <div style="display:flex;align-items:center;justify-content:space-between;gap:var(--space-3);padding:var(--space-4) var(--space-5) var(--space-2);flex-wrap:wrap;">
          <div class="status-tabs" id="scope-tabs">
            <button class="status-tab active" data-scope="mine">指派给我</button>
            <button class="status-tab" data-scope="all">全部对话</button>
          </div>
          <button class="btn btn--ghost btn--sm" id="unread-toggle" data-active="0">只看未读</button>
        </div>
        <!-- 状态 Tabs -->
        <div class="status-tabs" id="status-tabs" style="padding:0 var(--space-5);">
          <button class="status-tab active" data-status="all">全部 <span class="status-tab__count" id="cnt-all">0</span></button>
          <button class="status-tab" data-status="pending_human">待介入 <span class="status-tab__count" id="cnt-pending">0</span></button>
          <button class="status-tab" data-status="human_active">人工跟进中 <span class="status-tab__count" id="cnt-human">0</span></button>
          <button class="status-tab" data-status="resolved">已解决 <span class="status-tab__count" id="cnt-resolved">0</span></button>
          <button class="status-tab" data-status="bot">AI 回复中 <span class="status-tab__count" id="cnt-bot">0</span></button>
        </div>

        <!-- 对话列表 -->
        <div id="sessions-list" style="padding:var(--space-2) 0;"></div>
        <div class="admin-empty" id="sessions-empty" style="display:none;">
          <div class="admin-empty__icon"></div>
          <div class="admin-empty__text">暂无对话记录</div>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- 对话详情 Modal -->
<div class="modal-overlay" id="chat-modal" style="display:none;" onclick="closeModal(event)">
  <div class="modal-box" style="max-width:680px;" onclick="event.stopPropagation()">
    <div class="modal-header">
      <div>
        <h2 class="modal-title" id="modal-job-title">对话详情</h2>
        <div style="font-size:var(--text-xs);color:var(--color-text-muted);margin-top:2px;" id="modal-meta"></div>
        <div style="display:flex;align-items:center;gap:var(--space-2);margin-top:var(--space-2);flex-wrap:wrap;">
          <span class="tag" id="modal-status"></span>
          <span class="tag tag--pending" id="modal-reason" style="display:none;"></span>
        </div>
      </div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <div style="display:flex;align-items:center;gap:var(--space-3);margin-bottom:var(--space-4);flex-wrap:wrap;">
        <label class="form-label" style="margin:0;">负责人</label>
        <select class="form-input" id="assign-select" style="max-width:220px;"></select>
        <button class="btn btn--ghost btn--sm" id="assign-btn" onclick="assignCurrentSession()">更新负责人</button>
      </div>
      <!-- 消息列表 -->
      <div id="modal-messages" style="display:flex;flex-direction:column;gap:var(--space-3);max-height:360px;overflow-y:auto;margin-bottom:var(--space-4);"></div>
      <!-- 人工回复区 -->
      <div id="reply-area" style="display:none;">
        <div style="font-size:var(--text-xs);color:var(--color-text-muted);margin-bottom:var(--space-2);">人工回复</div>
        <textarea class="form-input" id="reply-input" rows="3" placeholder="输入回复内容…..."></textarea>
        <div style="display:flex;justify-content:flex-end;gap:var(--space-2);margin-top:var(--space-3);">
          <button class="btn btn--ghost" id="resolve-btn" onclick="resolveSession()">标记已解决</button>
          <button class="btn btn--primary" id="reply-btn" onclick="sendReply()">发送回复</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="../assets/js/store.js"></script>
<script src="../assets/js/utils.js"></script>
<script src="../assets/js/pages/admin-chat.js"></script>
</body>
</html>
