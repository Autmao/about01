<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>合作者档案 | 管理后台</title>
  <link rel="stylesheet" href="../assets/css/base.css">
  <link rel="stylesheet" href="../assets/css/layout.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/admin.css">
</head>
<body>
<div class="admin-layout">
  <aside class="admin-sidebar">
    <div class="admin-sidebar__brand">
      <div class="admin-sidebar__logo">about编辑部</div>
      <div class="admin-sidebar__tag">管理后台</div>
    </div>
    <div class="admin-sidebar__user" id="sidebar-user"></div>
    <nav class="admin-nav">
      <a href="index.html" class="admin-nav-item">
        <span class="admin-nav-item__icon">01</span> 岗位管理
      </a>
      <a href="applications.html" class="admin-nav-item">
        <span class="admin-nav-item__icon">02</span> 投递管理
      </a>
      <a href="collaborators.html" class="admin-nav-item active">
        <span class="admin-nav-item__icon">03</span> 合作者档案
      </a>
      <a href="chat.html" class="admin-nav-item" id="nav-chat">
        <span class="admin-nav-item__icon">04</span> 咨询记录
      </a>
      <a href="accounts.html" class="admin-nav-item" id="nav-accounts">
        <span class="admin-nav-item__icon">05</span> <span id="nav-accounts-label">账号设置</span>
      </a>
    </nav>
    <div class="admin-sidebar__footer">
      <a href="../index.html" target="_blank">↗ 访问前台</a>
      <a href="#" onclick="logout(); return false;">退出登录</a>
    </div>
  </aside>

  <main class="admin-main page-enter">
    <div class="admin-topbar">
      <h1 class="admin-page-title">合作者档案库</h1>
      <div style="display:flex;gap:var(--space-3);align-items:center;">
        <select class="form-input" id="sort-select" style="width:140px;font-size:var(--text-sm);">
          <option value="recent">最近合作</option>
          <option value="rating">评分最高</option>
        </select>
        <input type="search" class="form-input" id="collab-search" placeholder="搜索姓名、标签..." style="width:200px;font-size:var(--text-sm);">
      </div>
    </div>

    <div class="admin-content">
      <div id="collab-stats" style="margin-bottom:var(--space-5);font-size:var(--text-sm);color:var(--color-text-muted);"></div>
      <div class="collab-grid" id="collab-grid"></div>
      <div class="admin-empty" id="collab-empty" style="display:none;">
        <div class="admin-empty__icon">👤</div>
        <div class="admin-empty__text">档案库暂无记录，在投递管理中录用合作者后自动添加</div>
      </div>
    </div>
  </main>
</div>

<!-- 合作者详情 Modal -->
<div class="modal-overlay" id="collab-modal" style="display:none;" onclick="closeModal(event)">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-header">
      <h2 class="modal-title" id="modal-name">合作者详情</h2>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script src="../assets/js/store.js"></script>
<script src="../assets/js/utils.js"></script>
<script src="../assets/js/pages/admin-collab.js"></script>
</body>
</html>
