<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 | about编辑部</title>
  <link rel="stylesheet" href="assets/css/base.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <link rel="stylesheet" href="assets/css/admin.css">
</head>
<body class="auth-page">
  <div class="auth-box">
    <div class="auth-logo">about 编辑部</div>

    <!-- Step 1：输入手机号 -->
    <div id="step-phone">
      <div class="auth-subtitle">登录 / 注册账号</div>
      <div class="form-field" style="margin-bottom:var(--space-4);text-align:left;">
        <label class="form-label">手机号</label>
        <input type="tel" class="form-input" id="f-phone" maxlength="11" placeholder="请输入11位手机号" autocomplete="tel">
        <div class="auth-error" id="err-phone"></div>
      </div>
      <button class="btn btn--primary btn--full" id="btn-send-otp">获取验证码</button>
      <div class="auth-error" id="err-send"></div>
    </div>

    <!-- Step 2：输入验证码 + 可选姓名 -->
    <div id="step-code" style="display:none;">
      <div class="auth-subtitle" id="step-code-title">验证码已发送至 <span id="display-phone"></span></div>
      <div class="form-field" style="margin-bottom:var(--space-4);text-align:left;">
        <label class="form-label">验证码</label>
        <input type="text" class="form-input" id="f-code" maxlength="6" placeholder="6位验证码" autocomplete="one-time-code" inputmode="numeric">
        <div class="auth-error" id="err-code"></div>
      </div>
      <div id="name-field" style="margin-bottom:var(--space-4);text-align:left;">
        <label class="form-label">您的姓名 <span style="color:var(--color-text-muted);font-weight:normal;">（首次注册时填写）</span></label>
        <input type="text" class="form-input" id="f-name" placeholder="真实姓名" autocomplete="name">
      </div>
      <button class="btn btn--primary btn--full" id="btn-verify">登录 / 注册</button>
      <div class="auth-error" id="err-verify"></div>
      <div style="margin-top:var(--space-3);text-align:center;">
        <a href="#" id="btn-resend" style="font-size:var(--text-sm);color:var(--color-text-muted);">重新发送验证码</a>
      </div>
    </div>
  </div>

  <script src="assets/js/store.js"></script>
  <script>
    // 已登录则直接跳转
    if (Store.isUserLoggedIn()) {
      const redirect = new URLSearchParams(location.search).get('redirect') || 'my-applications.html';
      location.href = redirect;
    }

    const stepPhone = document.getElementById('step-phone');
    const stepCode = document.getElementById('step-code');
    let currentPhone = '';

    async function sendOtp() {
      const phone = document.getElementById('f-phone').value.trim();
      document.getElementById('err-phone').textContent = '';
      document.getElementById('err-send').textContent = '';
      if (!/^1[3-9]\d{9}$/.test(phone)) {
        document.getElementById('err-phone').textContent = '请输入有效的11位手机号';
        return;
      }
      const btn = document.getElementById('btn-send-otp');
      btn.disabled = true;
      btn.textContent = '发送中…';
      try {
        await Store.sendUserOtp(phone);
        currentPhone = phone;
        document.getElementById('display-phone').textContent = phone;
        stepPhone.style.display = 'none';
        stepCode.style.display = '';
        document.getElementById('f-code').focus();
      } catch (e) {
        document.getElementById('err-send').textContent = '验证码发送失败，请稍后重试';
      } finally {
        btn.disabled = false;
        btn.textContent = '获取验证码';
      }
    }

    async function verifyOtp() {
      const code = document.getElementById('f-code').value.trim();
      const name = document.getElementById('f-name').value.trim();
      document.getElementById('err-code').textContent = '';
      document.getElementById('err-verify').textContent = '';
      if (!code || code.length !== 6) {
        document.getElementById('err-code').textContent = '请输入6位验证码';
        return;
      }
      const btn = document.getElementById('btn-verify');
      btn.disabled = true;
      btn.textContent = '验证中…';
      try {
        await Store.verifyUserOtp(currentPhone, code, name, '');
        const redirect = new URLSearchParams(location.search).get('redirect') || 'my-applications.html';
        location.href = redirect;
      } catch (e) {
        document.getElementById('err-verify').textContent = e.status === 401 ? '验证码错误或已过期' : '验证失败，请重试';
        btn.disabled = false;
        btn.textContent = '登录 / 注册';
      }
    }

    document.getElementById('btn-send-otp').addEventListener('click', sendOtp);
    document.getElementById('f-phone').addEventListener('keydown', e => { if (e.key === 'Enter') sendOtp(); });
    document.getElementById('btn-verify').addEventListener('click', verifyOtp);
    document.getElementById('f-code').addEventListener('keydown', e => { if (e.key === 'Enter') verifyOtp(); });
    document.getElementById('btn-resend').addEventListener('click', async (e) => {
      e.preventDefault();
      stepCode.style.display = 'none';
      stepPhone.style.display = '';
      document.getElementById('f-phone').value = currentPhone;
    });
  </script>
</body>
</html>
